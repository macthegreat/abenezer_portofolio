<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NID_connect Control Panel</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>NID_connect</h1>
          <p>Registration & Commission Control Panel</p>
          <p class="highlight">IDNO (FIN) is globally unique and is the primary record identifier.</p>
        </div>
        <div class="api-config">
          <label for="apiBaseUrl">API Base URL</label>
          <input id="apiBaseUrl" placeholder="https://your-api-domain.com" />
        </div>
      </header>

      <main class="content">
        <section id="authCard" class="card">
          <h2>Login</h2>
          <div class="grid two">
            <div>
              <label>Email</label>
              <input id="loginEmail" type="email" placeholder="you@example.com" />
            </div>
            <div>
              <label>Password</label>
              <input id="loginPassword" type="password" placeholder="********" />
            </div>
          </div>
          <button id="loginBtn">Login</button>

          <details class="bootstrap">
            <summary>Bootstrap first supervisor (one-time only)</summary>
            <div class="grid three">
              <div><label>Name</label><input id="registerName" placeholder="Main Supervisor" /></div>
              <div><label>Email</label><input id="registerEmail" type="email" placeholder="admin@example.com" /></div>
              <div><label>Password</label><input id="registerPassword" type="password" placeholder="StrongPass123" /></div>
            </div>
            <button id="registerBtn">Create Supervisor</button>
          </details>
        </section>

        <section id="dashboardCard" class="card hidden">
          <div class="card-head">
            <h2 id="dashboardTitle">Dashboard</h2>
            <button id="logoutBtn" class="danger">Logout</button>
          </div>
          <div id="roleBadge" class="badge">role</div>

          <div class="block">
            <h3>IDNO lookup (global)</h3>
            <div class="grid two">
              <div>
                <label>IDNO / FIN</label>
                <input id="lookupIdno" placeholder="FIN12345" />
              </div>
              <div>
                <button id="lookupBtn" class="secondary">Check IDNO status</button>
              </div>
            </div>
          </div>

          <div id="dashboardBody"></div>
        </section>

        <section class="card">
          <h2>Response log</h2>
          <pre id="output"></pre>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
